<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 64" fill="none">
  <!-- Cercle monogramme -->
  <circle cx="32" cy="32" r="28" stroke="#8F5922" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="22" stroke="#8F5922" stroke-width="0.5" opacity="0.4"/>
  <!-- Lettres SD -->
  <text x="32" y="38" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="20" font-weight="600" font-style="italic"
    fill="#8F5922" letter-spacing="-1">SD</text>
  <!-- Séparateur vertical -->
  <line x1="74" y1="12" x2="74" y2="52" stroke="#8F5922" stroke-width="0.75" opacity="0.35"/>
  <!-- Nom de marque -->
  <text x="86" y="30"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="15" font-weight="600"
    fill="#8F5922" letter-spacing="3">SD COSMETIQUE</text>
  <!-- Tagline -->
  <text x="87" y="46"
    font-family="Arial, Helvetica, sans-serif"
    font-size="7.5" font-weight="400"
    fill="#B8782E" letter-spacing="2.5">BEAUTÉ AFRICAINE DE PRESTIGE</text>
</svg>
