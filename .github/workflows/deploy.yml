name: 🚀 Deploy to Hostinger

on:
  workflow_dispatch:
    # Déclenchement manuel uniquement
    # Le déploiement automatique est géré par ./deploy.sh (standalone mode requis)

jobs:
  deploy:
    name: Build & Deploy via rsync
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build Next.js
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: https://floralwhite-fish-697630.hostingersite.com
          NEXT_PUBLIC_SITE_NAME: SD Cosmétique
        run: npm run build

      - name: 🔑 Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: 📤 Upload build via rsync
        run: |
          REMOTE="${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"
          NODEJS_DIR="domains/floralwhite-fish-697630.hostingersite.com/nodejs"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }}" \
            .next/ \
            ${REMOTE}:${NODEJS_DIR}/.next/
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }}" \
            public/ \
            ${REMOTE}:${NODEJS_DIR}/public/

      - name: 🔄 Restart Passenger
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "touch \$HOME/domains/floralwhite-fish-697630.hostingersite.com/nodejs/tmp/restart.txt && echo 'Passenger restarted'"

      - name: 🏥 Health check
        run: |
          echo "⏳ Attente démarrage app (20s)..."
          sleep 20
          STATUS=$(curl -sk --max-time 15 -o /dev/null -w "%{http_code}" "https://floralwhite-fish-697630.hostingersite.com/")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "✅ Site opérationnel (HTTP $STATUS)"
